nodeLinker: node-modules

yarnPath: .yarn/releases/yarn-4.13.0.cjs

# Ensure prettier-plugin-css-order provides postcss to its descendants
# (satisfies css-declaration-sorter, postcss-less, postcss-scss peer requests)
packageExtensions:
  'prettier-plugin-css-order@*':
    dependencies:
      postcss: '^8.0.9'
  '@commitlint/load@*':
    dependencies:
      typescript: '~5.7.2'
      '@types/node': '^25.5.0'
