approvedGitRepositories:
  - "**"

enableScripts: true

nodeLinker: node-modules

npmMinimalAgeGate: 0

packageExtensions:
  "@commitlint/load@*":
    dependencies:
      "@types/node": ^25.5.0
      typescript: ~5.7.2
  "@vercel/express@*":
    dependencies:
      typescript: ~5.7.2
  prettier-plugin-css-order@*:
    dependencies:
      postcss: ^8.0.9
  vercel@*:
    dependencies:
      typescript: ~5.7.2

yarnPath: .yarn/releases/yarn-4.15.0.cjs
