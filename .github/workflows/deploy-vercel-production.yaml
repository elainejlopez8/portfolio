name: Deploy Vercel Production

on:
  workflow_dispatch:

permissions:
  actions: read
  contents: read

concurrency:
  group: vercel-production
  cancel-in-progress: true

jobs:
  verify-production-approver:
    if: ${{ !github.event.repository.private }}
    runs-on: ubuntu-latest

    steps:
      - name: Verify production environment requires repository owner approval
        uses: actions/github-script@v8
        with:
          script: |
            const envName = 'production';
            const repoOwner = context.repo.owner.toLowerCase();

            const { data: environment } = await github.request(
              'GET /repos/{owner}/{repo}/environments/{environment_name}',
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                environment_name: envName,
              },
            );

            const requiredReviewersRule =
              environment.protection_rules?.find((rule) => rule.type === 'required_reviewers');

            if (!requiredReviewersRule) {
              core.setFailed(
                `Environment \"${envName}\" must have required reviewers configured, including @${context.repo.owner}.`,
              );
              return;
            }

            const configuredUserReviewers =
              requiredReviewersRule.reviewers
                ?.filter((reviewer) => reviewer.type === 'User')
                .map((reviewer) => reviewer.reviewer?.login?.toLowerCase())
                .filter(Boolean) ?? [];

            if (!configuredUserReviewers.includes(repoOwner)) {
              core.setFailed(
                `Environment \"${envName}\" required reviewers must include @${context.repo.owner}. Current user reviewers: ${configuredUserReviewers.join(', ') || '(none)'}.`,
              );
              return;
            }

            core.info(`Environment \"${envName}\" includes @${context.repo.owner} as a required reviewer.`);

  deploy:
    needs: verify-production-approver
    if: ${{ !cancelled() && (github.event.repository.private || needs.verify-production-approver.result == 'success') }}
    runs-on: ubuntu-latest
    environment:
      name: production

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: yarn

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Verify Vercel secrets
        env:
          HAS_VERCEL_PRODUCTION_TOKEN: ${{ secrets.VERCEL_PRODUCTION_TOKEN != '' }}
          HAS_VERCEL_PRODUCTION_ORG_ID: ${{ secrets.VERCEL_PRODUCTION_ORG_ID != '' }}
          HAS_VERCEL_PRODUCTION_PROJECT_ID: ${{ secrets.VERCEL_PRODUCTION_PROJECT_ID != '' }}
        run: |
          if [[ "$HAS_VERCEL_PRODUCTION_TOKEN" != 'true' || "$HAS_VERCEL_PRODUCTION_ORG_ID" != 'true' || "$HAS_VERCEL_PRODUCTION_PROJECT_ID" != 'true' ]]; then
            echo 'Missing VERCEL_PRODUCTION_TOKEN, VERCEL_PRODUCTION_ORG_ID, or VERCEL_PRODUCTION_PROJECT_ID secret on the production environment.' >&2
            exit 1
          fi

      - name: Pull Vercel production environment
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_PRODUCTION_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_PRODUCTION_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PRODUCTION_PROJECT_ID }}
        run: yarn dlx --package vercel@latest vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build Vercel production artifacts
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_PRODUCTION_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_PRODUCTION_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PRODUCTION_PROJECT_ID }}
        run: yarn dlx --package vercel@latest vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy production to Vercel
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_PRODUCTION_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_PRODUCTION_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PRODUCTION_PROJECT_ID }}
        run: |
          DEPLOYMENT_URL="$(yarn dlx --package vercel@latest vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN" | tail -n 1)"
          echo "deployment_url=$DEPLOYMENT_URL" >> "$GITHUB_OUTPUT"

      - name: Write deployment summary
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment_url }}
        run: |
          {
            echo '## Vercel production deployment';
            echo '';
            echo 'This workflow is manual-only and always deploys the latest code from `main`.';
            echo 'Deployment approval is enforced by GitHub Environment protection on `production`.';
            echo "Production URL: $DEPLOYMENT_URL";
          } >> "$GITHUB_STEP_SUMMARY"
