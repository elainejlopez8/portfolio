name: Deploy Netlify Production

on:
  workflow_dispatch:

permissions:
  actions: read
  contents: read

concurrency:
  group: netlify-production
  cancel-in-progress: true

jobs:
  verify-production-approver:
    runs-on: ubuntu-latest

    steps:
      - name: Verify production environment requires repository owner approval
        uses: actions/github-script@v8
        with:
          script: |
            const envName = 'production';
            const repoOwner = context.repo.owner.toLowerCase();

            const { data: environment } = await github.request(
              'GET /repos/{owner}/{repo}/environments/{environment_name}',
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                environment_name: envName,
              },
            );

            const requiredReviewersRule =
              environment.protection_rules?.find((rule) => rule.type === 'required_reviewers');

            if (!requiredReviewersRule) {
              core.setFailed(
                `Environment \"${envName}\" must have required reviewers configured, including @${context.repo.owner}.`,
              );
              return;
            }

            const configuredUserReviewers =
              requiredReviewersRule.reviewers
                ?.filter((reviewer) => reviewer.type === 'User')
                .map((reviewer) => reviewer.reviewer?.login?.toLowerCase())
                .filter(Boolean) ?? [];

            if (!configuredUserReviewers.includes(repoOwner)) {
              core.setFailed(
                `Environment \"${envName}\" required reviewers must include @${context.repo.owner}. Current user reviewers: ${configuredUserReviewers.join(', ') || '(none)'}.`,
              );
              return;
            }

            core.info(`Environment \"${envName}\" includes @${context.repo.owner} as a required reviewer.`);

  deploy:
    needs: verify-production-approver
    runs-on: ubuntu-latest
    environment:
      name: production

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: yarn

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build site
        run: yarn build

      - name: Verify Netlify secrets
        env:
          HAS_NETLIFY_PRODUCTION_AUTH_TOKEN: ${{ secrets.NETLIFY_PRODUCTION_AUTH_TOKEN != '' }}
          HAS_NETLIFY_PRODUCTION_SITE_ID: ${{ secrets.NETLIFY_PRODUCTION_SITE_ID != '' }}
        run: |
          if [[ "$HAS_NETLIFY_PRODUCTION_AUTH_TOKEN" != 'true' || "$HAS_NETLIFY_PRODUCTION_SITE_ID" != 'true' ]]; then
            echo 'Missing NETLIFY_PRODUCTION_AUTH_TOKEN or NETLIFY_PRODUCTION_SITE_ID environment secret on the production environment.' >&2
            exit 1
          fi

      - name: Require GitHub owner approval
        uses: trstringer/manual-approval@38dcf9658c1101031a7111c091ce5f87982917d3
        with:
          secret: ${{ secrets.GITHUB_TOKEN }}
          approvers: ${{ github.repository_owner }}
          minimum-approvals: 1
          issue-title: 'Production deploy approval required'
          issue-body: 'Approve this workflow run to continue deploying to Netlify production.'

      - name: Deploy to Netlify production if unlocked
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_PRODUCTION_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_PRODUCTION_SITE_ID }}
        run: yarn dlx --package netlify-cli@17.38.1 netlify deploy --dir=dist --prod-if-unlocked --message "GitHub Actions deploy ${GITHUB_SHA}"

      - name: Write deployment summary
        run: |
          {
            echo '## Netlify production deployment';
            echo '';
            echo 'This workflow is manual-only and always deploys the latest code from `main`.';
            echo 'If Netlify production is locked, the deploy is created as a draft instead of publishing live.';
          } >> "$GITHUB_STEP_SUMMARY"
