name: Run Prettier

permissions:
  contents: read

# This action works with pull requests and pushes
on:
  pull_request:
  push:
    branches:
      - main

jobs:
  prettier:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          persist-credentials: false

      - name: Prettify code
        run: |
          corepack enable
          yarn install --immutable
          yarn prettier
